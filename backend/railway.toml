# Railway service config for the FastAPI backend.
# Set the service Root Directory to "backend" in the Railway dashboard so this
# file and requirements.txt are found.

[build]
builder = "nixpacks"

[deploy]
startCommand = "uvicorn api.main:app --host 0.0.0.0 --port $PORT"
healthcheckPath = "/health"
healthcheckTimeout = 100
restartPolicyType = "on_failure"
